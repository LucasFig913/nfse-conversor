<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conversor NFS-e · XML → PDF</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #080808;
      color: #e8e8e8;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 560px;
    }

    .hero {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .badge {
      display: inline-block;
      background: #0d2b1a;
      color: #22c55e;
      font-size: 10px;
      letter-spacing: 0.14em;
      padding: 4px 14px;
      border-radius: 100px;
      border: 1px solid #166534;
      margin-bottom: 1.25rem;
    }

    .hero h1 {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 2.25rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: #fff;
      line-height: 1;
      margin-bottom: 6px;
    }

    .hero h1 span { color: #22c55e; }

    .hero p {
      font-size: 10px;
      color: #333;
      letter-spacing: 0.1em;
    }

    .card {
      background: #0f0f0f;
      border: 1px solid #1a1a1a;
      border-radius: 16px;
      padding: 2rem;
    }

    .drop {
      border: 1px dashed #222;
      border-radius: 12px;
      padding: 2.5rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .drop:hover, .drop.over {
      border-color: #22c55e;
      background: #0a1a0e;
    }

    .drop-icon {
      font-size: 2.25rem;
      color: #252525;
      display: block;
      margin-bottom: 1rem;
      transition: color 0.2s;
    }

    .drop:hover .drop-icon, .drop.over .drop-icon {
      color: #22c55e;
    }

    .drop-label {
      font-family: system-ui, sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: #aaa;
      margin-bottom: 4px;
    }

    .drop-sub {
      font-size: 11px;
      color: #333;
    }

    #file-list {
      margin-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .file-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: #141414;
      border-radius: 8px;
      border: 1px solid #1e1e1e;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: none; }
    }

    .file-row i { font-size: 16px; color: #2a2a2a; flex-shrink: 0; }
    .fname { flex: 1; font-size: 11px; color: #666; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .fstatus { font-size: 11px; color: #2a2a2a; flex-shrink: 0; letter-spacing: 0.04em; }
    .fstatus.ok   { color: #22c55e; }
    .fstatus.err  { color: #ef4444; }
    .fstatus.proc { color: #f59e0b; }

    .divider {
      height: 1px;
      background: #161616;
      margin: 1.5rem 0;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      background: #22c55e;
      color: #000;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: system-ui, sans-serif;
      letter-spacing: -0.01em;
      transition: background 0.15s, transform 0.1s;
    }

    .btn-primary:hover   { background: #16a34a; }
    .btn-primary:active  { transform: scale(0.97); }
    .btn-primary:disabled { background: #0d2b1a; color: #1a4d2a; cursor: not-allowed; }

    .btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 10px 20px;
      border-radius: 8px;
      border: 1px solid #1e1e1e;
      background: transparent;
      color: #444;
      font-size: 13px;
      cursor: pointer;
      font-family: system-ui, sans-serif;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-ghost:hover { border-color: #333; color: #888; }

    footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 10px;
      color: #1e1e1e;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="hero">
      <div class="badge">⬡ NFS-e · SPED · fazenda.gov.br</div>
      <h1>XML <span>→</span> PDF</h1>
      <p>PROCESSAMENTO 100% LOCAL · NENHUM DADO ENVIADO</p>
    </div>

    <div class="card">

      <div class="drop" id="drop"
        onclick="document.getElementById('fi').click()"
        ondragover="event.preventDefault(); this.classList.add('over')"
        ondragleave="this.classList.remove('over')"
        ondrop="onDrop(event)">
        <i class="ti ti-file-arrow-up drop-icon" aria-hidden="true"></i>
        <p class="drop-label">Arraste seus XMLs aqui ou clique para selecionar</p>
        <p class="drop-sub">múltiplos arquivos · padrão NFS-e</p>
        <input type="file" id="fi" accept=".xml" multiple style="display:none" onchange="addFiles(Array.from(this.files))">
      </div>

      <div id="file-list"></div>

      <div id="actions" style="display:none">
        <div class="divider"></div>
        <div class="actions">
          <button class="btn-primary" id="btn-convert" onclick="convertAll()">
            <i class="ti ti-download" aria-hidden="true"></i> Gerar PDFs
          </button>
          <button class="btn-ghost" onclick="clearAll()">
            <i class="ti ti-trash" aria-hidden="true"></i> Limpar
          </button>
        </div>
      </div>

    </div>

    <footer>CONVERSOR CLIENT-SIDE · SEM SERVIDOR · SEM COOKIES</footer>

  </div>

  <script>
    let files = [];

    function onDrop(e) {
      e.preventDefault();
      document.getElementById('drop').classList.remove('over');
      addFiles(Array.from(e.dataTransfer.files).filter(f => f.name.endsWith('.xml')));
    }

    function addFiles(newFiles) {
      newFiles.forEach(f => { if (!files.find(x => x.name === f.name)) files.push(f); });
      render();
    }

    function render() {
      const list = document.getElementById('file-list');
      list.innerHTML = '';
      files.forEach((f, i) => {
        const row = document.createElement('div');
        row.className = 'file-row';
        row.innerHTML = `
          <i class="ti ti-file-text" aria-hidden="true"></i>
          <span class="fname">${f.name}</span>
          <span class="fstatus" id="s${i}">—</span>
        `;
        list.appendChild(row);
      });
      document.getElementById('actions').style.display = files.length ? 'block' : 'none';
    }

    function clearAll() {
      files = [];
      document.getElementById('file-list').innerHTML = '';
      document.getElementById('actions').style.display = 'none';
    }

    function xget(doc, path) {
      try {
        const r = doc.evaluate(path, doc, p => p === 'nfse' ? 'http://www.sped.fazenda.gov.br/nfse' : null, XPathResult.FIRST_ORDERED_NODE_TYPE, null);
        return r.singleNodeValue ? r.singleNodeValue.textContent.trim() : '';
      } catch { return ''; }
    }

    function parseXML(txt) {
      const doc = new DOMParser().parseFromString(txt, 'application/xml');
      const g = p => xget(doc, p);
      return {
        numero:        g('//nfse:infNFSe/nfse:nNFSe'),
        emissao:       g('//nfse:infNFSe/nfse:dhProc'),
        prestador:     g('//nfse:emit/nfse:xNome'),
        prestadorCnpj: g('//nfse:emit/nfse:CNPJ'),
        tomador:       g('//nfse:toma/nfse:xNome'),
        tomadorCnpj:   g('//nfse:toma/nfse:CNPJ'),
        descricao:     g('//nfse:xDescServ'),
        valorServico:  g('//nfse:vServ'),
        valorIss:      g('//nfse:vISSQN'),
        valorLiquido:  g('//nfse:vLiq'),
      };
    }

    function gerarPDF(d, nome) {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ format: 'a4', unit: 'mm' });
      const L = 20, W = 170; let y = 22;

      const line = (txt, size = 11, bold = false, rgb = [20, 20, 20]) => {
        doc.setFontSize(size); doc.setFont('helvetica', bold ? 'bold' : 'normal'); doc.setTextColor(...rgb);
        const ls = doc.splitTextToSize(String(txt || '—'), W);
        doc.text(ls, L, y); y += ls.length * (size * 0.43) + 2;
      };

      const field = (label, val) => {
        doc.setFontSize(10); doc.setFont('helvetica', 'bold'); doc.setTextColor(100, 100, 100); doc.text(label, L, y);
        doc.setFont('helvetica', 'normal'); doc.setTextColor(20, 20, 20);
        const ls = doc.splitTextToSize(String(val || '—'), W - 42); doc.text(ls, L + 40, y);
        y += Math.max(ls.length, 1) * 5 + 1;
      };

      const section = (t) => {
        y += 5;
        doc.setFillColor(15, 42, 27); doc.rect(L - 2, y - 4, W + 4, 8, 'F');
        doc.setFontSize(9); doc.setFont('helvetica', 'bold'); doc.setTextColor(34, 197, 94);
        doc.text(t.toUpperCase(), L, y); y += 7;
      };

      doc.setFillColor(15, 15, 15); doc.rect(0, 0, 210, 297, 'F');
      doc.setFillColor(10, 30, 18); doc.rect(0, 0, 210, 30, 'F');
      doc.setFontSize(14); doc.setFont('helvetica', 'bold'); doc.setTextColor(34, 197, 94);
      doc.text('NFS-e', L, y);
      doc.setTextColor(180, 180, 180); doc.text(' · Nota Fiscal de Serviço Eletrônica', L + 18, y);
      y += 10;
      doc.setFontSize(8); doc.setFont('helvetica', 'normal'); doc.setTextColor(70, 70, 70);
      doc.text('DANFS-e · Documento Auxiliar', L, y);
      y += 10;
      doc.setDrawColor(28, 28, 28); doc.setLineWidth(0.3); doc.line(L, y, L + W, y); y += 6;

      line(`Número: ${d.numero || '—'}`, 10, false, [140, 140, 140]);
      line(`Emissão: ${d.emissao || '—'}`, 10, false, [140, 140, 140]);

      section('Prestador');
      field('Razão Social:', d.prestador); field('CNPJ:', d.prestadorCnpj);

      section('Tomador');
      field('Razão Social:', d.tomador); field('CNPJ:', d.tomadorCnpj);

      section('Descrição do serviço');
      y += 2; line(d.descricao, 10, false, [170, 170, 170]);

      section('Valores');
      field('Valor do serviço:', `R$ ${d.valorServico}`);
      field('ISSQN:', `R$ ${d.valorIss}`);
      y += 3;
      doc.setFillColor(10, 30, 18); doc.rect(L - 2, y - 4, W + 4, 10, 'F');
      doc.setDrawColor(34, 197, 94); doc.setLineWidth(0.4); doc.rect(L - 2, y - 4, W + 4, 10, 'S');
      doc.setFontSize(10); doc.setFont('helvetica', 'bold'); doc.setTextColor(80, 80, 80); doc.text('Valor líquido:', L, y);
      doc.setTextColor(34, 197, 94); doc.text(`R$ ${d.valorLiquido || '—'}`, L + 40, y);
      y += 14;

      doc.setDrawColor(22, 22, 22); doc.line(L, y, L + W, y); y += 5;
      doc.setFontSize(7); doc.setFont('helvetica', 'italic'); doc.setTextColor(40, 40, 40);
      doc.text('Gerado automaticamente · processamento local · nenhum dado transmitido', L, y);

      doc.save(nome);
    }

    async function convertAll() {
      const btn = document.getElementById('btn-convert');
      btn.disabled = true; btn.innerHTML = '<i class="ti ti-loader"></i> Convertendo...';

      for (let i = 0; i < files.length; i++) {
        const s = document.getElementById('s' + i);
        s.textContent = 'processando'; s.className = 'fstatus proc';
        try {
          const txt = await files[i].text();
          const d = parseXML(txt);
          gerarPDF(d, files[i].name.replace(/\.xml$/i, '') + '.pdf');
          s.textContent = '✓ baixado'; s.className = 'fstatus ok';
        } catch (e) {
          s.textContent = '✗ erro'; s.className = 'fstatus err';
          console.error(files[i].name, e);
        }
      }

      btn.disabled = false; btn.innerHTML = '<i class="ti ti-download"></i> Gerar PDFs';
    }
  </script>
</body>
</html>
